function getUrgency(returnDate) {
  if (!returnDate) return {
    label: "—",
    color: "#475569",
    days: 9999,
    pulse: false
  };
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var ret = new Date(returnDate + "T00:00:00");
  var diff = Math.round((ret - today) / 86400000);
  if (diff < 0) return {
    label: "".concat(Math.abs(diff), "d late"),
    color: "#EF4444",
    days: diff,
    pulse: true
  };
  if (diff === 0) return {
    label: "Today",
    color: "#F59E0B",
    days: 0,
    pulse: true
  };
  if (diff <= 3) return {
    label: "".concat(diff, "d"),
    color: "#F59E0B",
    days: diff,
    pulse: false
  };
  if (diff <= 7) return {
    label: "".concat(diff, "d"),
    color: "#84CC16",
    days: diff,
    pulse: false
  };
  return {
    label: "".concat(diff, "d"),
    color: "#22C55E",
    days: diff,
    pulse: false
  };
}

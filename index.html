function getUrgency(returnDate) {

    color: "#475569",
    days: 9999,
    pulse: false

  today.setHours(0, 0, 0, 0);
  var ret = new Date(returnDate + "T00:00:00");
  var diff = Math.round((ret - today) / 86400000);

    color: "#EF4444",
    days: diff,
    pulse: true

    color: "#F59E0B",
    days: 0,
    pulse: true
  };
  if (diff <= 3) return {

    color: "#F59E0B",
    days: diff,
    pulse: false

    days: diff,
